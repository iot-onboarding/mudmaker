ProxyPass /mudzip http://mudzipserver:8085/mudzip
ProxyPassReverse /mudzip http://mudzipserver:8085/mudzip

# gitmud: GitHub OAuth shovel and PR generator. The Flask app registers its
# routes at the root (/oAuthv2, /dorepo, /branch, /therest, /gottoken); the
# trailing slash on the source path strips the /gitShovel prefix before the
# request is forwarded.
ProxyPass /gitShovel/ http://gitmud:8000/
ProxyPassReverse /gitShovel/ http://gitmud:8000/

ProxyTimeout 30
